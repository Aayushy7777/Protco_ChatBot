version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ./BACKEND
      dockerfile: ../docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./BACKEND:/app
      - ./BACKEND/data:/app/data
    env_file:
      - ./BACKEND/.env
    depends_on:
      - ollama

volumes:
  ollama_data:
